version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eolmaeossjeo_db
    environment:
      POSTGRES_USER: eolmae
      POSTGRES_PASSWORD: eolmae1234
      POSTGRES_DB: eolmaeossjeo
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eolmae -d eolmaeossjeo']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eolmaeossjeo_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
